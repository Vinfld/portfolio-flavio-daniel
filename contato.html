<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="menu-fixo">
        <div class="menu-fixo-topo">
            <button id="btn-hamburguer" class="btn-hamburguer">[≡]</button>
            <button id="btn-tema" class="btn-tema">Tema</button>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Sobre</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 600px;">
        <h1>// ENTRE EM CONTATO</h1>
        <p style="margin-bottom: 30px;">Preencha os dados abaixo para contato direto.</p>

        <form id="form-contato">

            <div class="campo-form">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome..." autocomplete="name">
                <span class="erro" id="erro-nome"></span>
            </div>

            <div class="campo-form">
                <label for="email">Endereço Eletrônico:</label>
                <input type="email" id="email" placeholder="nome@dominio.com" autocomplete="email">
                <span class="erro" id="erro-email"></span>
            </div>

            <div class="campo-form">
                <label for="mensagem">Dados da Mensagem:</label>
                <textarea id="mensagem" rows="5" placeholder="Sua mensagem aqui..."></textarea>
                <span class="erro" id="erro-msg"></span>
            </div>

            <button type="submit" class="btn-enviar">Transmitir Dados</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
